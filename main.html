<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./script.css">
    <title>Document</title>
</head>
<body>
    <div class = "card">
        <h1>Motor Parameter</h1>

        <div class="power">
            <label for="power_w">Power (W)</label>
            <input type="number" id="power_w" placeholder="e.g. 100">
            <span class="unit">W</span>
        </div>
        <div class="speed">
            <label for="speed_rpm">Speed (RPM)</label>
            <input type="number" id="speed_rpm" placeholder="e.g. 100">
            <span class="unit">RPM</span>
        </div>
        <div class="btn-group">
            <button class="btn" onclick="selected(this, 'NoGear')">No Gear</button>
            <button class="btn" onclick="selected(this, 'WithGear')">With Gear</button>
        </div>
        <div id="stage" style="display: none">
            <button class="btn" value="1" onclick="stage(this, 1)">1 stage </button>
            <button class="btn" value="2" onclick="stage(this, 2)">2 stage </button>
            <button class="btn" value="3" onclick="stage(this, 3)">3 stage </button>
            <button class="btn" value="4" onclick="stage(this, 4)">4 stage </button>
        </div>
        <div id="dropdown" style="display: none">
            <div id="gearInputs"></div>
            <div class="efficiency">
                <label for="efficiency">Efficiency (%)</label>
                <input type="number" id="efficiency" placeholder="e.g. 75">
                <span class="unit">%</span>
            </div>
            <p>Total Gear Ratio: <span id="totalRatio">-</span></p>
        </div>
        <button onclick="calculate_torque()">Calculate</button>

        <div class="result">
            <p>Result:<span id="result"></span><span class="unit">Nm</span></p>
            <table id="torqueTable" border="1">
                <thead>
                    <tr>
                        <th>Power (W)</th>
                        <th>Speed (RPM)</th>
                        <th>Gear Ratio</th>
                        <th>Rated Torque (Nm)</th>
                        <th>Max Torque (Nm)</th>
                        <th>New Rated Torque (Nm)</th>
                        <th>New Max Torque (Nm)</th>
                        <th>New Rated Torque include Efficiency (Nm)</th>
                        <th>New Max Torque include Efficiency(Nm)</th>
                        <th>New Speed (RPM)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
