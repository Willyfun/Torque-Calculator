<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./script.css">
    <title>Gear Design</title>
</head>
<body>
    <div class="card">
        <button type="button" onclick="window.location.href='./main.html'">Back to Calculator</button>
    </div>
    <form>
        <div class="module">
            <label for="module">Please enter desired module:</label>
            <input type="number" id="module" placeholder="e.g. 1">
            <span class="unit">mm</span>
        </div>
        <div class="gearratio">
            <label for="GearRatio">Please enter Gear Ratio:</label>
            <input type="number" id="GearRatio" placeholder="e.g. 1">
        </div>
        <div class="facewidth">
            <label for="FaceWidth">Please enter face width:</label>
            <input type="number" id="FaceWidth" placeholder="e.g. 30">
            <span class="unit">mm</span>
        </div>
        <div class="pressureangle">
            <label for="dropdownButton">Please select pressure angle (&#945):</label>
            <div class="custom-dropdown">
                <button type="button" onclick="toggleDropdown()" id="dropdownButton">
                    pressure angle
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button type="button" onclick="selectOption('14.5\u00b0')">
                        <span>14.5&deg;</span>
                        <span class="info-symbol" tabindex="0" onclick="event.stopPropagation()">
                            i
                            <span class="tooltip">
                                <span><strong>Best for:</strong> Precision instruments, older machinery</span>
                                <span><strong>Pros:</strong> Smoothest operation, low bearing load</span>
                                <span><strong>Cons:</strong> Weak teeth, undercutting problems on small gears</span>
                            </span>
                        </span>
                    </button>
                    <button type="button" onclick="selectOption('20\u00b0')">
                        <span>20&deg;</span>
                        <span class="info-symbol" tabindex="0" onclick="event.stopPropagation()">
                            i
                            <span class="tooltip">
                                <span><strong>Best for:</strong> Most gearboxes, planetary gears, industrial machinery</span>
                                <span><strong>Pros:</strong> Good balance of strength, efficiency, and manufacturability</span>
                                <span><strong>Cons:</strong> No major drawbacks</span>
                            </span>
                        </span>
                    </button>
                    <button type="button" onclick="selectOption('25\u00b0')">
                        <span>25&deg;</span>
                        <span class="info-symbol" tabindex="0" onclick="event.stopPropagation()">
                            i
                            <span class="tooltip">
                                <span><strong>Best for:</strong> Heavy-duty gearboxes, high-torque applications</span>
                                <span><strong>Pros:</strong> Strongest teeth, higher load capacity</span>
                                <span><strong>Cons:</strong> Higher bearing load, more noise and vibration</span>
                            </span>
                        </span>
                    </button>
                </div>
            </div>
        </div>
        
        <button type="button" onclick="calculate_teeth()">Calculate</button>
    </form>
    <div class="option" style="display: none">
        <table id="teethtable" border="1">
            <thead>
                <tr>
                    <th>Sun Gear Teeth</th>
                    <th>Planet Gear Teeth</th>
                    <th>Ring Gear Teeth</th>
                    <th>Sun Pitch Diameter (mm)</th>
                    <th>Planet Pitch Diameter (mm)</th>
                    <th>Ring Pitch Diameter (mm)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="selectedDesign" class="selected-design" style="display: none">
            <h2>Selected Gear Design</h2>
            <p>Choose a row to continue the calculation.</p>
        </div>
    </div>
    <script src="./design.js"></script>
</body>
</html>
